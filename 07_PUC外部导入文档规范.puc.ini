; ============================================
; PUC外部导入文档规范 (v1.0)
; 说明：定义 PUC 如何引入和适配非PUC格式的外部数据源
;       涵盖数据源声明(Source)、格式映射(Mapping)、
;       转换数据(Data)三层结构。
;       支持 ICS/YAML/JSON/MD/CSV 等任意外部格式。
; 基于规范：PUC注释增强规范 v3.0.6 + PUC文件集规范 v3.0.5
;        + PUC-AI载入文档规范 v1.0
; __note__ = <[1-9][0-9]?-[1-9]?> | D00-D03 号段
; 制定时间：2026-05-23
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留，通常不用。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。

; ================ IMPORT 外部导入规范 ================
[PUC\IMPORT]
__note__ = <D00-2> PUC外部导入根节 | 定义PUC如何引入非PUC格式的外部数据源。本规范采用 Source→Mapping→Data 三层架构：Source声明数据源身份，Mapping定义格式转换规则，Data存放转换后的PUC数据。与 [PUC\LAUNCH] <C00-2> 分工：LAUNCH管内部PUC文档链的启动加载，IMPORT管外部非PUC数据的按需引入。
PUC\IMPORT_GUID = {E57B3B7F-9207-4AD1-932A-213BA824A150} | 节名"PUC\IMPORT"的GUID
Purpose:用途 = 将外部数据源（ICS/YAML/JSON/MD/CSV等）引入PUC体系，定义声明→映射→转换的标准化流程
Architecture:架构 = Source(数据源声明) + Mapping(格式映射规则) + Data(转换后数据)
Principle:核心原则 =
    来源可溯源：Source保留原始文件路径、格式类型、版本、生产者，确保数据可追溯。
    映射可复现：Mapping定义来源字段→PUC键值的一一对应关系，AI可据此反复转换。
    数据可独立：Data可作为独立 .puc.ini 子文件存在，也可嵌入主文档。
    格式不可知：Source不限定格式，Mapping描述转换规则，理论上支持任意格式。
Scope:适用范围 = ICS日历、YAML配置、JSON数据集、Markdown文档、CSV表格、及其他可解析的文本格式
Distinction:与相关模块的区别 =
    [PUC\LAUNCH] <C00-2> | 管内部PUC文档链的启动加载 | 对象已是PUC格式
    [PUC\LAUNCH\MountPoint] <C03-3> | 管PUC文档间的内部挂载 | 对象为合规PUC文档
    [PUC\IMPORT] <D00-2> | 管外部非PUC数据的按需引入 | 对象为任意外部格式
    三者互补：LAUNCH(启动链) + MountPoint(PUC内挂载) + IMPORT(跨界引入)

; ================ Source 数据源声明规范 ================
[PUC\IMPORT\Source]
__note__ = <D01-3> 数据源声明规范 | 描述外部数据来源的完整身份信息，确保数据可溯源。AI读取Source后应能自行判断格式类型并执行相应解析。
PUC\IMPORT\Source_GUID = {DC68BDB6-A237-47D1-B9C3-21FA8E545AF7} | 节名"PUC\IMPORT\Source"的GUID
Purpose:用途 = 声明外部数据源的身份、格式、路径和提取范围
RequiredKeys:必须定义的键 =
    Format:源格式 = 外部文件的格式类型 | 如 ICS(RFC 5545)、YAML、JSON、Markdown、CSV | AI据此选择解析器
    FilePath:源文件路径 = 外部文件的绝对或相对路径 | 可使用Environment变量 <VariableName>
    Scope:提取范围 = 从源文件中提取的数据子集 | 如 "2026"(年份)、"Sheet1"(工作表)、"section-3"(Markdown节)
OptionalKeys:可选键 =
    Version:源版本 = 外部格式的版本号 | 如 ICS 2.0、YAML 1.2
    Producer:生产者 = 数据源的生产者标识 | 如 ICS的PRODID字段
    LastModified:源最后更新 = 源文件的最后修改日期 | YYYY-MM-DD
    Description:数据描述 = 对数据源内容的简要描述
    Encoding:编码 = 源文件字符编码 | 默认 UTF-8
Example:示例 =
    Format:源格式 = ICS
    FilePath:源文件路径 = D:\Share\AI_Files\DOCs\chinese_calendar.ics
    Version:源版本 = 2.0
    Producer:生产者 = -//YangH9//China Calendar//CN
    LastModified:源最后更新 = 2026-03-19
    Scope:提取范围 = 2026 | 仅提取2026年的日历事件
    Description:数据描述 = 中华人民共和国2026年日历：法定节假日+调休补班+二十四节气+纪念日

; ================ Mapping 格式映射规范 ================
[PUC\IMPORT\Mapping]
__note__ = <D02-3> 格式映射规范 | 定义外部格式字段到PUC键值的转换规则。AI通过Mapping理解如何将源数据转换为PUC结构。映射规则应足够详细，使任何支持PUC的AI都能重现转换过程。
PUC\IMPORT\Mapping_GUID = {A0740CDE-148D-471B-885B-6060CF85A23E} | 节名"PUC\IMPORT\Mapping"的GUID
Purpose:用途 = 描述外部格式字段→PUC键值的映射关系，包括类型识别规则和输出结构
EventTypeRule:事件类型识别 =
    根据源数据的某个字段值区分事件类型，每种类型可对应不同的PUC结构。
    示例(ICS)：
      UID含_solarTerm_ → 二十四节气 | 节注释含节气名和日期范围
      UID含_holiday_ → 法定假期 | 逐日拆分，键注释含第N天/共M天
      UID含_compensateday_ → 调休补班 | 标记为待定状态，带提前闹钟
      UID含_festival_ → 节日/纪念日 | 含详细背景描述
FieldMap:字段映射表 =
    逐对声明源字段→PUC键的对应关系。格式：源字段 = PUC键:键注释 | 值注释 | 处理规则
    示例(ICS→PUC)：
      DTSTART = Date:日期 | 格式YYYY-MM-DD | ICS DATE值直接映射
      SUMMARY = Name:事件名 | 清除「」『』包裹标记 | 正则提取纯文本
      DESCRIPTION = Note:说明 | 提取第一段(到首个\n\n为止) | 舍弃通知URL
      STATUS = Status:状态 | CONFIRMED→确认 | TENTATIVE→待定 | CANCELLED→取消
      UID = SourceUID:源唯一标识 | 保留原始UID | 用于溯源和去重
OutputStruct:输出结构 =
    定义转换后数据在PUC中的组织方式。
    推荐按某种自然维度分节（如按月份、按类别、按日期）。
    每个原子数据单元对应一个子节，含统一键集。
    示例：按月份分节 PUC\IMPORT\Data\Month-{MM}，每个事件一个Round子节。
Constraint:映射约束 =
    映射必须可逆或至少可溯源——转换后的PUC数据必须通过SourceUID追溯到原始记录。
    处理规则用自然语言描述，AI自行判断执行方式。
    复杂转换（如日期运算、正则提取）应在处理规则中明确算法。

; ================ Data 转换数据规范 ================
[PUC\IMPORT\Data]
__note__ = <D03-3> 转换后数据规范 | 存放按Mapping规则转换后的PUC格式数据。Data可内联于本规范文件中，也可独立为 .puc.ini 子文件（通过MountFile挂载或MANIFEST加载）。
PUC\IMPORT\Data_GUID = {4D898CDD-7D79-4479-B071-B765A256D42D} | 节名"PUC\IMPORT\Data"的GUID
Purpose:用途 = 存储转换后的PUC数据，提供统一的子节结构
DataLocation:数据位置 = Inline(内联于本文件) / External(独立子文件) | 推荐大型数据集使用External
NodeStructure:子节结构 =
    当按月份分节时：
      月份根节 = [PUC\IMPORT\Data\Month-{MM}] | 如 Month-01
      事件子节 = [PUC\IMPORT\Data\Month-{MM}\Round-{DD}] | 如 Round-01(元旦假期)
    每个事件子节包含统一键集：Date + Name + Type + Status + Note + SourceUID
    键集由Mapping的FieldMap定义。
Sample:示例数据(2026年1月) =
    [PUC\IMPORT\Data\Month-01]
    __note__ = 2026年1月日历事件 | 元旦假期+补班+节气+节日
    PUC\IMPORT\Data\Month-01_GUID = {864CA3C3-1133-4B95-9ED3-FC80378EB2A4} | 节名GUID
    EventCount:事件数 = 8 | 假期3天+补班1天+节气2个+节日2个

    [PUC\IMPORT\Data\Month-01\Round-01]
    __note__ = 2026-01-01 | 元旦假期第1天
    PUC\IMPORT\Data\Round-01_GUID = {3764AD56-20D3-4CCB-9984-D8C9731E1F76} | 节名GUID
    Date:日期 = 2026-01-01 | YYYY-MM-DD
    Name:事件名 = 元旦假期 | SUMMARY原文「元旦 假期」第1天/共3天
    Type:类型 = Holiday | 法定假期
    Status:状态 = 确认 | ICS STATUS:CONFIRMED
    Note:说明 = 元旦：1月1日(周四)至3日(周六)放假调休共3天。1月4日(周日)上班。 | ICS DESCRIPTION首段
    SourceUID:源标识 = 20260101T000001_holiday_all_34@YangH9 | 原始ICS UID

    ; 完整数据实例见 chinese_calendar.puc.ini（2026年159个事件完整转换）

AIConversion:AI自行转换要求 =
    AI读取IMPORT模块后，应按以下步骤自行完成转换：
    1. 读取 [Source] 确认文件路径和格式类型。
    2. 读取 [Mapping] 理解字段映射关系。
    3. 根据 Mapping 规则解析源文件，生成 PUC 格式数据。
    4. 按 OutputStruct 定义的层级结构写入 [Data] 子节。
    5. 若 Data 已存在，对比 SourceUID 做增量更新而非全量覆盖。
    AI可自行完成 ICS↔PUC 互转：读取 Data 中的 SourceUID 可追溯回原始 ICS 事件，重新生成 ICS 时按 Mapping 规则反向映射。
Bidirectional:双向转换保证 = Source+Mapping+Data 的组合信息足以让AI实现 ICS→PUC 和 PUC→ICS 的双向转换。AI只需理解Mapping中的字段对应关系和Data中的SourceUID溯源链，即可在两个格式间无损往返。

