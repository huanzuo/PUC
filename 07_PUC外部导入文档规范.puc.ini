[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节，仅作为文件结尾标记
__Specification___GUID = {82579FF5-605D-4D84-8A37-FF65661E947C} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <D03-3> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC外部导入文档规范
Version:规范版本 = 1.0
Date:制定日期 = 2026-05-23
BasedOn:基础规范 = PUC注释增强规范 v3.0.6 + PUC文件集规范 v3.0.5.1 + PUC-AI载入文档规范 v1.0 + PUC-AI_Knowledge_Base v1.0(08KB) + PUC-AI_Session_Memory v1.0(09SM)
Description:描述 = 定义PUC引入外部非PUC格式数据的标准化协议。Source(数据源声明) + Mapping(字段映射规则) + Data(转换后PUC数据) 三层架构，以ICS日历为第一示例格式(2026年中国日历数据)。与LAUNCH和MountPoint分工：LAUNCH管内部PUC文档链、MountPoint管PUC文档间挂载、IMPORT管外部跨界引入。AI可依据Source+Mapping自行完成格式转换，SourceUID保证双向可溯源。