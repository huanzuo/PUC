; 说明: 定义 AI/Agent 可调用的外部工具、命令行程序、Shell脚本、API端点
;        的完整元数据体系。涵盖工具发现、权限分级、参数约束、执行策略、
;        环境变量依赖和输出校验规则。
; 基于规范: PUC注释增强规范 v3.0.7 + PUC文件集规范 v3.0.5
