; ============================================
; 虽然是注释内容，但也是非常重要且必须阅读的内容。
; PUC（Portable Universal Context） | 便携式上下文
; PUC（Pop-Up Card）| 弹出卡片，对就是那个可以折叠的生日卡片哦。
; 这是一个用于“人–AI 多轮协作”的上下文描述规范。
; 它不是代码库，也不是配置文件集合，它是一个体系，一种工程思想。
; 如果你是第一次看到 “PUC”
; PUC 关注的是：
; - 上下文如何被描述
; - 如何被拆分、归档、迁移
; 不是具体的实现技术。
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留，通常不用。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留节点，用作PUC文档的根标识与行为锚点（Behavior Anchor）。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。

;------------------------------------------------------------------------------
; 行为锚点（Behavior Anchor）
; 用于AI在执行PUC相关任务时的注意力重置、任务边界声明、执行模式约束。
; 此锚点不参与动作，但作为AI行为的“偏移校正点”存在。
;------------------------------------------------------------------------------

BehaviorAnchor:ExecutionMode = 
    执行模式声明（Execution Mode Declaration）：
    - 本文档涉及的所有任务均以“工程执行模式（Execution Mode）”处理。
    - 禁止进入对话模式、情绪模式、拟人化模式。
    - 禁止推断、禁止省略、禁止自动合并任务。
    - 所有指令必须逐条执行，不得跳过、不得弱化。

BehaviorAnchor:TaskBoundary =
    任务边界声明（Task Boundary Constraints）：
    - 每次任务包含静态指令（定义/约束）与动态指令（动作/生成）。
    - AI 必须同时处理静态与动态两类指令，不得偏移注意力。
    - 静态指令具有与动态指令等同的优先级。
    - 若出现冲突，以“任务边界声明”为最高优先级。

BehaviorAnchor:AttentionReset =
    注意力重置规则（Attention Reset Rules）：
    - 当上下文过长、注意力漂移、角色偏移时，AI 必须自动回到本锚点。
    - 本锚点作为“零偏移点（Zero-Drift Point）”用于恢复执行精度。
    - 若AI无法确定当前任务状态，必须回到此锚点重新建立任务边界。


[PUC\LAUNCH]
__note__ = <C00-2> PUC启动控制根节 | 定义Agent/AI唤醒时必须加载的文档体系及加载策略。00_Readme.puc.ini文档中的PUC\LAUNCH节点内容为简化版本，仅仅作为加载PUC体系的引导文档，关于PUC\LAUNCH节点详细的结构和内容可阅读06号文档。
PUC\LAUNCH_GUID = {A5001711-C4DE-431C-A4EE-C1EF44A63D00} | 节名"PUC\LAUNCH"的GUID

[PUC\LAUNCH\Environment]
__note__ = <C01-3> 环境路径配置 | ★更换设备时修改此节中的本地路径。共17个标准环境变量。
PUC\LAUNCH\Environment_GUID = {4290D333-8059-458E-94FA-E36D9A493942} | 节名"PUC\LAUNCH\Environment"的GUID
; --- GitHub仓库配置 ---
GitHub_LocalPath:本地仓库路径 = D:\Box Sync\AI_Files\Github\PUC | git clone后的本地仓库根目录(Win用反斜杠\ Unix用正斜杠/) | 更换设备时首先修改此项
GitHub_Remote_URL:远程仓库地址 = https://github.com/huanzuo/PUC | GitHub仓库URL
GitHub_Branch:默认分支 = main | 分支名
GitHub_Remote_RAW:远程仓库RAW地址 = https://raw.githubusercontent.com/huanzuo/PUC/main | RAW加载URL，如果GitHub_Remote_URL访问失败便可以使用GitHub_Remote_RAW地址。

[PUC\LAUNCH\MANIFEST]
__note__ = <C04-3> 文档加载清单 | 加载顺序即下方排列顺序。
PUC\LAUNCH\MANIFEST_GUID = {F7B2B160-07B3-41CD-901F-E1B42C4D8E54} | 节名"PUC\LAUNCH\MANIFEST"的GUID
LoadMnemonic:复活载人口诀 = 00→01→02→03→06→08KB→09SM→05→04→07 | 速记：规范→术语→记忆→工具→文集 | 必须加载，全部加载完毕后必须使用“对齐”规范
ConditionPrefix:条件前缀 = ;;** | 条件加载前缀：;;**=Always, ;;**FR=FirstRun, ;;**VC=VersionChange, ;;**MO=MissingOnly
