; ========== 规范元数据 ==========
[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节，仅作为文件结尾标记
__Specification___GUID = {36DE4DB5-CAC4-442A-8ADE-35F56A333020} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <B03-6> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC文件集规范
Version:规范版本 = 3.0.6
Date:制定日期 = 2026-03-20 | 修订 2026-06-27 更新 Notes 板块结构(10规范)：Note→Entry→Content/References 三层
BasedOn:基础规范 = PUC注释增强规范 v3.0.7 + PUC-AI载入文档规范 v1.0(06) + PUC外部导入文档规范 v1.0(07) + PUC-AI_Knowledge_Base v1.0(08KB) + PUC-AI_Session_Memory v1.0(09SM) + PUC笔记节点规范 v3.0.6(10)
Description:描述 = PUC文件集结构规范，定义 DOCs 系下五个板块：DOCs内部(Archives传统归档+Notes笔记节点+PROJECTS项目档案+REFERENCES工具手册) + DOCs外部(AGENT认知体系 C00号段+SKILLS工具能力 E00号段)。08规范(KnowledgeBase+SessionMemory)挂接于AGENT下。Archives（传统对话归档，兼容旧版）、Notes（笔记节点，十进制 130-139）、PROJECTS（项目开发档案库，十六进制 A00-AFF）、REFERENCES（工具参考手册库，十六进制 B00-BFF）。每个 Project-{GUID} 和 Ref-{GUID} 均可独立为一个 .puc.ini 文件，主规范文件仅保留索引。所有节点遵循 PUC 三层注释规范。

; =============================PUC文件集规范部分树形结构图=============================
; [PUC] <1-1> | PUC标志根节点
; ├─ [PUC\SPEC] <4-2> | PUC规范核心父节点
; ├─ [PUC\Maintainer] <30-2> | 公共维护者声明
; │  └─ [PUC\Maintainer\huanzuo] <31-3> | 维护者描述
; ├─ [PUC\DOCs] <100-2> | 文件集主控节
; │  ├─ [PUC\DOCs\BOOT] <101-3> | 文件集启动模块
