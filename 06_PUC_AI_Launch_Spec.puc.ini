[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节，仅作为文件结尾标记
__Specification___GUID = {43486B9B-506E-42B6-8332-4C5465E65FEA} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <C04-3> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC-AI载入文档规范
Version:规范版本 = 1.0
Date:制定日期 = 2026-05-22
BasedOn:基础规范 = PUC注释增强规范 v3.0.7 + PUC文件集规范 v3.0.5.1 + PUC-AI_Knowledge_Base v1.0(08KB) + PUC-AI_Session_Memory v1.0(09SM)
Description:描述 = 定义AI/Agent启动时的文档加载规范。采用Environment(路径变量)+LoadStrategy(加载策略)+MANIFEST(文件清单)+MountPoint(挂载点)四层架构。Environment集中管理路径变量实现跨设备可移植；MANIFEST仅列文件名实现零变动；MountPoint支持编辑器总揽模式下展开外部子文档。本规范与01(语法)、02(结构)、08(Agent认知)共同构成PUC体系的五大支柱规范。