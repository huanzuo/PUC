; ============================================
; PUC-AI载入文档规范 (v1.0)
; 文件名: 06_PUC_AI_Launch_Spec.puc.ini
; 说明：定义 AI/Agent 启动时如何加载 PUC 文档体系的完整规范
;       涵盖启动控制(LAUNCH)、环境路径(Environment)、
;       文档清单(MANIFEST)、加载策略(LoadStrategy)、
;       以及文档内子文件挂载(MountPoint)。
; 基于规范：PUC注释增强规范 v3.0.5 + PUC文件集规范 v3.0.5
; __note__ = <[1-9][0-9]?-[1-9]?> | C00-C04 号段
; 制定时间：2026-05-22 13:15
; 更新时间：2026-05-26 00:00 | 新增17个环境变量规范+Condition条件加载+MountFile版本约束/回退策略
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留节点，用作PUC文档的根标识与行为锚点（Behavior Anchor）。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。
BehaviorAnchor:行为锚点 = 用于AI在执行PUC相关任务时的注意力重置、任务边界声明、执行模式约束。此锚点不参与动作，但作为AI行为的“偏移校正点”存在。
BehaviorAnchor_ExecutionMode:执行模式声明 = 
    - 本文档涉及的所有任务均以“工程执行模式（Execution Mode）”处理。
    - 禁止进入对话模式、情绪模式、拟人化模式。
    - 禁止推断、禁止省略、禁止自动合并任务。
    - 所有指令必须逐条执行，不得跳过、不得弱化。
BehaviorAnchor_TaskBoundary:任务边界声明 =
    - 每次任务包含静态指令（定义/约束）与动态指令（动作/生成）。
    - AI 必须同时处理静态与动态两类指令，不得偏移注意力。
    - 静态指令具有与动态指令等同的优先级。
    - 若出现冲突，以“任务边界声明”为最高优先级。
BehaviorAnchor_AttentionReset:注意力重置规则 =
    - 当上下文过长、注意力漂移、角色偏移时，AI 必须自动回到本锚点。
    - 本锚点作为“零偏移点（Zero-Drift Point）”用于恢复执行精度。
    - 若AI无法确定当前任务状态，必须回到此锚点重新建立任务边界。

; ================ LAUNCH 启动控制规范 ================
[PUC\LAUNCH]
__note__ = <C00-2> PUC启动控制根节 | 定义Agent/AI唤醒时必须加载的文档体系及加载策略。本规范采用 Environment-MANIFEST 分离架构：Environment集中定义路径变量，MANIFEST仅列文件名。更换设备时只需修改Environment中的本地路径，MANIFEST零变动。
PUC\LAUNCH_GUID = {A5001711-C4DE-431C-A4EE-C1EF44A63D00} | 节名"PUC\LAUNCH"的GUID
Purpose:用途 = 为AI/Agent提供标准化的文档加载协议，实现跨设备、跨客户端的上下文恢复
Architecture:架构 = Environment(路径变量) + LoadStrategy(加载策略) + MANIFEST(文件清单) + MountPoint(挂载引用) | 注：外部非PUC数据引入见 [PUC\IMPORT] <D00-2> (07规范)；Agent认知体系见 [PUC\AGENT] <E00-2> (08/09规范：KnowledgeBase E01~E04号段+SessionMemory E10~E30号段)
Principle:核心原则 =
    路径与文件名分离：Environment定义所有目录路径，MANIFEST仅列文件名，通过路径前缀变量拼接完整路径。
    更换设备最小化：仅在Environment中修改本地路径(通常只需改GitHub_LocalPath)，其余配置不受影响。
    加载顺序可控：LoadOrder决定串行/并行，LoadFailure决定失败时的处理策略。
    挂载点可伸缩：MountFile键允许文档内引用外部PUC文件，支持编辑器的总揽模式展开。
Scope:适用范围 = DeepSeek TUI、VS Code扩展(PUCEditor)、及其他支持PUC协议的AI客户端
LoadSwitch:逐项加载开关 = 行首 ;** 三字符前缀标记 | 以;**开头的MANIFEST条目行视为"已关闭"，加载器跳过该条目，编辑器渲染为灰色删除线样式。去掉;**前缀即可恢复加载。区别于普通注释(;开头，人读备注)，;**为机器可读的禁用标记。未定义或空白时全部加载。

; ================ Environment 环境路径规范 ================
[PUC\LAUNCH\Environment]
__note__ = <C01-3> 环境路径变量规范 | 集中定义所有工作路径，供MANIFEST和MountPoint的路径前缀引用。更换设备时仅需修改本节的本地路径键值。
PUC\LAUNCH\Environment_GUID = {4290D333-8059-458E-94FA-E36D9A493942} | 节名"PUC\LAUNCH\Environment"的GUID
Purpose:用途 = 将路径配置收敛到单节，实现跨设备可移植性
RequiredKeys:必须定义的变量 =
    GitHub_Remote_URL:远程仓库地址 = GitHub仓库的HTTPS URL，用于git clone/pull | 如 https://github.com/huanzuo/PUC
    GitHub_Branch:默认分支 = 远程仓库的默认分支名称 | 如 main
    GitHub_Remote_RAW:远程仓库RAW地址 = GitHub仓库的RAW地址 | RAW加载URL，如果GitHub_Remote_URL访问失败便可以使用GitHub_Remote_RAW地址。
    GitHub_LocalPath:本地仓库路径 = git clone后的本地仓库根目录(Win用反斜杠\ Unix用正斜杠/) | 更换设备时首先修改此项，可使用.pucsetting\setpath.ps1来更正路径名。
    SpecDir:规范文件目录 = 指向PUC规范源文件(00-09号)所在目录 | 通常等于<GitHub_LocalPath>
    LaunchDir:启动配置文件目录 = AI各实例的Launch配置文件存放目录 | 如 <MemoryDir>
    KnowledgeDir:知识库目录 = Agent语义知识库文件存放目录 | 如 <MemoryDir>
    MemoryDir:记忆文件目录 = TUI知识库、会话记忆、项目记录、参考手册的存放目录 | 如与PUC仓库平级的私有归档目录
    ArchiveDir:对话归档目录 = 传统对话归档文件存放目录 | 如 <MemoryDir>
    ProjectDir:项目档案目录 = 项目开发记录文件存放目录 | 如 <MemoryDir>
    RefDir:参考手册目录 = 工具参考手册文件存放目录 | 如 <MemoryDir>
    ImportDir:导入数据目录 = 外部导入数据文件存放目录 | 如 <MemoryDir>
    WorkspaceDir:工作空间目录 = 文件池根目录，所有操作的根路径 | 如 D:\Share\AI_Files
    OutputDir:输出目录 = AI文档输出默认目录 | 如 <WorkspaceDir>\DOCs
    CodeDir:代码目录 = 脚本和源代码存放目录 | 如 <WorkspaceDir>\Codes
    ToolsDir:工具集目录 = 高级工具集的存放目录 | 如 <WorkspaceDir>\Supertools
OptionalKeys:可选变量 =
    PUCRoot:PUC仓库根目录 = PUC规范仓库根目录，通常等于<GitHub_LocalPath> | 可与SpecDir合并
    PowerShellDir:PowerShell脚本目录 = PowerShell诊断修复脚本存放目录 | 如 <CodeDir>\PowerShell
NamingRule:命名规则 =
    键名使用CamelCase英文，不含空格和特殊字符。
    命名约定：<XxxDir>结尾表示目录路径，<XxxPath>结尾表示文件路径，<XxxURL>结尾表示网络地址。
    值使用绝对路径(Win:\\或Unix:/)，支持引用同节其他变量 <VariableName>。
    路径分隔符：Win使用反斜杠\\，Unix使用正斜杠/，AI客户端需按运行平台自动适配。
ReferenceRule:变量引用规则 =
    在同一Environment节内，可在值中使用 <VariableName> 引用已定义的变量。
    解析顺序：按键的物理排列顺序依次解析，因此被引用变量必须先于引用者定义。
    引用仅限同节内，不支持跨节引用。
    引用语法：<VariableName>，花括号内为被引用变量的键名。
Example:示例 =
    GitHub_LocalPath:本地仓库路径 = D:\Share\AI_Files\DOCs\github\PUC
    SpecDir:规范文件目录 = <GitHub_LocalPath> | 就是本地仓库路径
    MemoryDir:记忆文件目录 = D:\Share\AI_Files\DOCs\github\PUC_Privates_Archives\AI_Archives
    ToolsDir:工具集目录 = D:\Share\AI_Files\Supertools

; ================ LoadStrategy 加载策略规范 ================
[PUC\LAUNCH\LoadStrategy]
__note__ = <C02-3> 加载策略规范 | 定义MANIFEST清单文件的加载行为和失败处理
PUC\LAUNCH\LoadStrategy_GUID = {9CD48B8D-51D3-4B44-BD06-8F246221569F} | 节名"PUC\LAUNCH\LoadStrategy"的GUID
LoadOrder:加载顺序 = Sequential | Sequential(顺序加载，按MANIFEST中键的排列顺序逐一加载) / Parallel(并行加载，适合大上下文窗口的AI)
LoadFailure:加载失败处理 = Abort | Abort(中断启动，文件缺失则停止并报错) / Skip(跳过并继续，记录警告日志) / Warn(警告但继续，适合部分文件可选时)
LoadTimeout:加载超时(秒) = 30 | 单个文件加载的超时时间，适用于从远程获取规范文件时
RetryCount:重试次数 = 1 | 加载失败后的重试次数(仅适用于网络获取场景)
Constraint:约束 = LoadStrategy节为可选节。未定义时默认 LoadOrder=Sequential, LoadFailure=Abort。

; ================ MANIFEST 文档清单规范 ================
[PUC\LAUNCH\MANIFEST]
__note__ = <C04-3> 文档加载清单规范 | 定义Agent启动时需要加载的文件清单。MANIFEST仅列文件名，路径前缀由Environment中的对应目录变量提供。清单排列顺序即加载顺序(当LoadOrder=Sequential时)。
PUC\LAUNCH\MANIFEST_GUID = {F7B2B160-07B3-41CD-901F-E1B42C4D8E54} | 节名"PUC\LAUNCH\MANIFEST"的GUID
Purpose:用途 = 声明Agent启动时必须加载的文件集合，每个键对应一个文件
KeyFormat:键名格式 =
    键名采用分类前缀_标识符格式 | 如 TUI_Knowledge、Project_SPEview、Spec_01
    分类前缀建议：Spec(规范文件)、TUI(TUI记忆文件)、Project(项目记录)、Ref(参考手册)、Tools(工具集)
    标识符无空格，使用下划线分隔，保持简洁。
ValueFormat:值格式 =
    值为文件名(含扩展名)，不含目录路径。
    路径前缀在值注释中声明，格式：前缀=<Environment中的变量名>
    完整路径 = <路径前缀>\<文件名>
    当路径前缀等于文件名目录的Environment变量时，可省略前缀注释。
NamingConventions:命名约定 =
    注释行可用于分组文件：
      ; TUI唤醒加载项（前缀=<MemoryDir>）
      TUI_Knowledge:知识库文件 = AI_Knowledge_Base.puc.ini
      TUI_Session:会话记忆文件 = AI_Session_Memory.puc.ini
    下一组文件的路径前缀继承最近声明的分组注释。
DisabledPrefix:禁用条目规则 =
    行首 ;** 三字符前缀标记该条目为"已关闭"状态。
    加载器跳过以;**开头的条目行，编辑器以灰色删除线样式渲染。
    去掉;**前缀即可恢复加载，条目内容完整保留。
    区别于普通注释(;开头，人读备注)：;**为机器可读的禁用标记。
    示例：
      ;**Project_SPEview:SPEview项目 = SPEview开发项目记录.puc.ini | 此行被跳过
      Project_PUCEditor:PUCEditor项目 = PUCEditor开发项目记录.puc.ini | 此行正常加载
ConditionPrefix:条件加载标记 =
    使用 <Condition:键=值> 语法声明条目的加载前提条件。
    仅当条件匹配时该条目才被加载，否则跳过（行为类似;**但不修改源文件）。
    常用条件键：OS(操作系统)、Agent(AI客户端名称)、Version(PUC版本范围)。
    示例：
      Project_SPEview:SPEview项目 = SPEview开发项目记录.puc.ini | <Condition:OS=Windows>
      ;**Ref_KoboldCPP:KoboldCPP手册 = KoboldCPP操作手册.puc.ini | <Condition:Agent=DeepSeek-TUI> | 仅DeepSeek TUI加载
LoadingTiers:推荐分层 =
    Tier0_格式基石 = 00_README + 01_PUC注释增强规范 + 02_PUC文件集规范 | 定义PUC语法和结构
    Tier1_术语对齐 = 03_PUC核心术语增量库 + AI_Knowledge_Base | 对齐术语和概念体系
    Tier2_语境恢复 = AI_Session_Memory | 恢复上次会话的完整上下文
    Tier3_工具能力 = 05_PUC工具与命令集 + 工具与命令集 | 加载工具和命令能力
    Tier4_项目工程 = 项目记忆文档(SPEview/PUCEditor等) | 恢复各项目的开发状态
    Tier5_参考手册 = 参考手册文档(KoboldCPP等) | 按需加载
Example:示例 =
    ; === 规范文件（前缀=<SpecDir>）===
    Spec_00:入口规范 = 00_README.puc.ini
    Spec_01:注释增强规范 = 01_PUC注释增强规范(v3.0.5).puc.ini
    ; === TUI记忆（前缀=<MemoryDir>）===
    TUI_Knowledge:知识库 = AI_Knowledge_Base.puc.ini

; ================ MountPoint 挂载点规范 ================
[PUC\LAUNCH\MountPoint]
__note__ = <C03-3> 文档挂载点规范 | 定义PUC文档内如何通过MountFile保留键引用外部子文档。在纯文本(INI)模式下MountFile为一个普通键值行；在PUC编辑器总揽模式下，编辑器可按挂载点展开外部文件内容，形成统一文档树。
PUC\LAUNCH\MountPoint_GUID = {1E184B38-4C3F-4B25-ACB1-FE3262200491} | 节名"PUC\LAUNCH\MountPoint"的GUID
MountFile:保留键名 = MountFile | PUC保留键，用于声明当前节对应一个外部PUC子文档。键注释描述外部文档的用途，值注释声明路径前缀。
MountFile_KeyFormat:键格式 = MountFile:键注释 = 文件名.puc.ini | 前缀=<Environment变量名>
MountFile_Behavior:行为描述 =
    INI模式(纯文本) = MountFile作为普通键值行显示，不展开。
    PUC模式(子文件) = 识别MountFile键，可点击跳转打开外部文件进行编辑。
    总揽模式(聚合视图) = 按MountFile键加载外部文件内容，内联展开为当前文档树的子节点。
    文件不存在时 = 显示"未挂载"占位符节点(灰色虚线框)，不中断加载。
MountFile_Constraint:约束 =
    MountFile键仅声明挂载关系，不替代MANIFEST。MANIFEST管启动时自动加载，MountFile管编辑器内按需展开。
    一个节最多声明一个MountFile键（因为GUID唯一对应一个外部文件）。
    外部文件自身也必须是合规的PUC文档。
    挂载展开为只读聚合视图，修改需跳转到子文件模式。
MountFile_VersionCheck:版本约束 =
    加载器读取外部文件的BOOT节，检查MinPUCVersion/MaxPUCVersion(见08/09规范)。
    若主程序PUC版本低于文件的MinPUCVersion，应警告用户版本不兼容。
    若主程序PUC版本高于文件的MaxPUCVersion，应提示新特性可能被忽略。
MountFile_Fallback:回退策略 =
    文件不存在时：显示"未挂载"占位符节点(灰色虚线框)，不中断加载。
    文件损坏时：跳过该挂载点，记录警告日志，继续加载后续节点。
    版本不兼容时：加载文件但标注⚠️版本警告，不阻止用户查看。
MountFile_Distinction:与IMPORT的区别 = MountFile挂载的是另一个PUC文档(内部)，[PUC\IMPORT]引入的是ICS/YAML/JSON/MD等非PUC格式的外部数据源。两者互补：MountFile管PUC生态内引用，IMPORT管跨界数据引入。详见07_PUC外部导入文档规范。
MountFile_Relationship:与MANIFEST的关系 =
    MANIFEST的文件也可同时被MountFile引用，两者不互斥。
    MANIFEST中的文件会自动在总揽树中展示；MountFile挂载的文件需用户手动展开。
    一个外部文件可以既在MANIFEST中(启动时自动加载)，又在MountFile中(编辑器内按需展开)。
Example:示例 =
    [PUC\DOCs\PROJECTS\Project-{F7D5930C-4F02-4AA9-99B9-CEEC156C91EE}]
    __note__ = <A01-4> SPEview PE分析扩展 | 可独立为 SPEview.puc.ini
    PUC\DOCs\PROJECTS\Project_GUID = {E67B5BEC-D136-4A2E-BA07-2DF979BDC103}
    MountFile:外部项目文档 = SPEview开发项目记录.puc.ini | 前缀=<MemoryDir>
    ; 总揽模式下编辑器将展开 SPEview开发项目记录.puc.ini 的完整子树

