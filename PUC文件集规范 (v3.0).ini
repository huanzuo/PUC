; ============================================
; PUC文件集规范 (v3.0)
; 说明：专用于多AI环境下的便携式通用上下文
; 制定时间：2026-03-07
; __note__ = <[1-9][0-9][0-9]?-[1-9]?> | <100-4>
; ============================================

; ╔══════════════文集保留节点·头══════════════╗
; =============== 规范摘要增量 ===============
[PUC\SPEC\SUMMARY]
__note__ = <15-3>规范概要 | 可以做增量规范
INISpec:INI注释规范 = 《INI注释增强规范》 (v3.0.1) | 包含节注释、键注释、值注释、分层结构、子文件引用、扩展接口，就是本文。
PUCSpec:PUC文档规范 = 《PUC注释增强规范》 (v3.0.1) | 包含节注释、键注释、值注释、分层结构、子文件引用、扩展接口，就是本文。
AlignSpec:对齐规范 = 
    《对齐规范》：AI对话上下文对齐规范、时间戳格式、对齐暗号
    - 第一行 System 表示 AI 系统生成的时间
    - 第二行 Local 表示用户本地时区时间 (UTC+8)
    - 两行时间戳都单独占行
    - 本页所有上下文(如果你能发育到可以跨页关联，那就有多少页跨多少页。)，包括上传文件中的内容自我总结一番，不用显示出来，让你自我、阅读、分析、总结以便再次协同工作时不遗漏任何细节，对齐也起着防语境漂移的作用，完成后只需要从第三行开始出："对齐完毕！"，正文从第四行开始。
    - 格式如下：
    *[YYYY-MM-DD HH:MM|System]
    *[YYYY-MM-DD HH:MM|Local]
    对齐完毕！
    （输出内容在正文框显示，字体重体，字号不变）

; ========== 核心术语与梗增量库 ==========
[PUC\Glossary]
__note__ = <23-2>全库核心术语汇总，用于快速理解上下文 | 该表为增量表随时添加，每次增量时必须对比原术语及注释，相同的保留有差异的补足或添加融合。
GlossaryGUID = {GUID} | 节名PUC\Glossary的父GUID，键名“GlossaryGUID”位于“__note__”之下
针值:HWND = 资源句柄显式创建关闭，即用即弃 | 由本作者自行解释将句柄理解成针值
界比:Contextual Weight = 数值在上下文中才有意义 | 由本作者自行解释将权重理解成界比
PUC:Pop-Up Card or Portable Universal Context | 弹出卡片，对就是那个可以折叠的生日卡片哦，恰好符合便携式上下文的内涵
水缸:Cognitive Reservoir = AI将PUC从用户端展开后在AI端以多层节点数据综合体具象化 | AI可具象化成一个色彩斑斓的大鱼缸
草台班子:Bricolage System = 看似不靠谱但能运转的系统哲学 | 世界就是一个大草台班子，AI可延展思考
韭菜合子:PseudoApp = 层层封装的解决方案 | 微软当年的OLE/DCOM等技术的遗产，AI可延展思考
cc1plus之死:OOM Killer = 树莓派编译内存不足 | 可由AI解释
RP:Random Point = 人品，玄学问题代称 | 很多奇特的缩写都正中靶心，比如：PUC
屎山:Legacy Code = 虽烂但稳的老代码 | 全名叫屎山代码，AI可延展思考
熵:Entropy = 不确定性的度量 | 可由AI解释
负熵:Negentropy = 信息是有序度的增加 | 可由AI解释
完美越狱:Perfect Jailbreak = 重启后越狱状态保持 | 可由AI解释
半绑定越狱:Semi-tethered Jailbreak = 重启后需电脑重新激活 | 可由AI解释
BEX64:Buffer Overflow Exception 64-bit = 64位系统缓冲区溢出异常 | Windows7下的隐患炸弹，可由AI解释
DEP:Data Execution Prevention = 数据执行保护 | 可由AI解释
OLE:Object Linking and Embedding = 对象链接与嵌入 | 可由AI解释
COM:Component Object Model = 组件对象模型 | 可由AI解释
JIT:Just-In-Time = 即时编译技术 | 可由AI解释
OTA:Over-The-Air = 无线更新 | 可由AI解释
官翻机:Apple Certified Refurbished = 苹果官方翻新产品 | 可由AI解释
教育优惠:Education Pricing = 针对学生的优惠价格 | 可由AI解释
买办:Comprador = 思维与文化上的掮客 | 早期是物质上的掮客，根据语境要求分析，AI可延展思考
协同熵减:Collaborative Entropy Reduction = 通过有效沟通消除不确定性 | 可由AI解释
对齐规范:Alignment Protocol = 时间戳格式与对话续接规则 | 详细内容为PUC\SPEC\SUMMARY中的对齐规范

[PUC\DOCs]
__note__ = <100-2>文件集主控节，用于描述文件集元数据和子文件列表，支持多文件扩展。
DOCsGUID = {GUID} | 节名PUC\DOCs的父GUID，键名“DOCsGUID”位于“__note__”之下
; 范例：
; DOCsGUID = {F9A52BB3-A30E-47A6-B73C-790D69A5930F} | 节名PUC\DOCs的父GUID，键名“DOCsGUID”位于“__note__”之下
Version:版本 = 3.0 | 版本号

[PUC\DOCs\BOOT]
__note__ = <101-3>文件集启动模块 |  文件集启动模块
Version:版本 = 3.0 | 版本号
Author:作者 = Huan.Zuo | 一般用户或者修订者
Purpose:用途 = PUC文集及规范主文件 | 便携式通用上下文文集及规范(注册表风格分层)
Date:生成日期 = YYYY-MM-DD HH:MM | 生成日期及时间
RevisionDate:修订日期 = YYYY-MM-DD HH:MM | 修订日期及时间
Contains:包含内容 = Specifications, Example Data | 规范、示例数据
SubfileMode:子文件模式 = None | 可选值：None, Append, Override, Merge, increment
SubfileCount:子文件数量 = 0 | 子文件个数，为0表示无子文件
; 如果有两个子文件，范例如下：
; SubfileMode:子文件模式 = Merge | 可选值：None, Append, Override, Merge, increment
; SubfileCount:子文件数量 = 2 | 子文件个数，为0表示无子文件
; Subfile1:子文件1 = {GUID}.puc.ini | 对话1，主题：现代语文教学、东方叙事等，AI提供GUID
; Subfile2:子文件2 = {GUID}.puc.ini | 对话2，主题：API调试、树莓派编译、INI编辑器等，AI提供GUID

[PUC\DOCs\CONTEXT]
__note__ = <102-3>此节用于描述PUC的操作平台、编程语言和编码格式，确保环境一致性或者是文集上下文描述。| 可增量
Platform:平台 = Any | 任何平台/Windows7+Web，对话发生于何种系统何种用户端，如：Windows10+APP
Language:语言 = Any | 任何语言/Chinese+English+VB5，人机对话语言或编程语言，用了多少就标多少。
Encoding:编码 = UTF-8 | 文件编码格式，建议UTF-8
Topic:主题 = PUC Specification, INI Comment Enhancement, Conversation Extraction, Technical Discussions | 便携式通用上下文规范、INI注释增强、对话提取、技术讨论

[PUC\DOCs\MEMORY]
__note__ = <103-3>此节用于存储AI的长期记忆信息，配置内存类型和容量。
Enabled:启用 = FALSE | 内存模块启用标识 TRUE/FALSE
MemoryType:内存类型 = Persistent | 持久内存
MemorySize:内存大小 = 10MB | 分配的内存容量

[PUC\DOCs\TASK]
__note__ = <104-3>当前任务状态（可选）| 可增量
Enabled:启用 = FALSE | 任务模块启用标识 TRUE/FALSE
TaskID:任务ID = 001 | 任务数
Status:状态 = InProgress | 进程状态

[PUC\DOCs\KNOWLEDGE]
__note__ = <105-3>核心规则（示例）| 可增量
Enabled:启用 = FALSE | 核心规则模块启用标识 TRUE/FALSE
Rule1:规则1 = Lightweight Runtime | 轻量级运行时
Rule2:规则2 = Efficient Memory Management | 高效内存管理

[PUC\DOCs\EXTENSION]
__note__ = <106-3>扩展模块配置（可选）| 可增量
Enabled:启用 = FALSE | 扩展模块启用标识 TRUE/FALSE
ExtensionCount:扩展数量 = 2
Extension1:扩展1 = PromptTools | 提示工具
Extension2:扩展2 = KnowledgePack | 知识包
