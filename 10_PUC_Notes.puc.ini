Name:规范名称 = PUC笔记节点规范
Version:规范版本 = 3.0.6
Date:制定日期 = 2026-06-26 | 创建日期
BasedOn:基础规范 = PUC注释增强规范 v3.0.7 + PUC文件集规范 v3.0.5.1
Description:描述 = PUC笔记节点结构规范，定义 DOCs\Notes 节点下的笔记管理功能。提供快速记录、临时备忘、想法整理等功能。支持笔记分类、标签、优先级、状态管理等特性。所有节点遵循 PUC 三层注释规范。

; =============================PUC笔记节点规范树形结构图=============================
; [PUC] <1-1> | PUC标志根节点
; ├─ [PUC\SPEC] <4-2> | PUC规范核心父节点
; ├─ [PUC\Maintainer] <30-2> | 公共维护者声明
; │  └─ [PUC\Maintainer\huanzuo] <31-3> | 维护者描述
; ├─ [PUC\DOCs\Notes] <1A0-3> | Notes笔记节点
; │  ├─ [PUC\DOCs\Notes\BOOT] <1A1-4> | Notes启动模块
; │  ├─ [PUC\DOCs\Notes\CONTEXT] <1A2-4> | Notes上下文描述
; │  ├─ [PUC\DOCs\Notes\Note-{GUID}] <1A3-4> | 笔记条目
; │  │   └─ [PUC\DOCs\Notes\Note-{GUID}\Metadata] <1A4-5> | 笔记元数据
; │  ├─ [PUC\DOCs\Notes\Note-{GUID}] <1A5-4> | 更多笔记条目
; │  │   └─ [PUC\DOCs\Notes\Note-{GUID}\Metadata] <1A6-5> | 笔记元数据
; │  └─ ...... <YYY-X> | 可扩展的其他笔记条目
; └─ [__Specification__] <ZZZ-Z> | 规范元数据