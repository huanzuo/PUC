; ========== 规范元数据 ==========
[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节，仅作为文件结尾标记
__Specification___GUID = {736D7B71-F348-4BC1-8D95-C9658E6DB685} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <136-6> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC笔记节点规范
Version:规范版本 = 3.0.6
Date:制定日期 = 2026-06-26 | 创建日期
BasedOn:基础规范 = PUC注释增强规范 v3.0.7 + PUC文件集规范 v3.0.5.1
Description:描述 = PUC笔记节点结构规范，定义 DOCs\Notes 节点下的笔记管理功能。采用"主题(Note)→条目(Entry)→正文(Content)/引用(References)"三层结构，支持一主题多笔记、多行正文、类型化关联引用。所有节点遵循 PUC 三层注释规范。

; =============================PUC笔记节点规范树形结构图=============================
; [PUC] <1-1> | PUC标志根节点
; ├─ [PUC\SPEC] <4-2> | PUC规范核心父节点
; ├─ [PUC\Maintainer] <30-2> | 公共维护者声明
; │  └─ [PUC\Maintainer\huanzuo] <31-3> | 维护者描述
; ├─ [PUC\DOCs] <100-2> | 文件集主控节
; │  └─ [PUC\DOCs\Notes] <130-3> | Notes笔记节点
; │     ├─ [PUC\DOCs\Notes\BOOT] <131-4> | Notes启动模块
; │     ├─ [PUC\DOCs\Notes\CONTEXT] <132-4> | Notes上下文描述
; │     ├─ [PUC\DOCs\Notes\Note-{GUID}] <133-4> | 笔记主题
; │     │  ├─ [PUC\DOCs\Notes\Note-{GUID}\Entry001] <134-5> | 笔记条目
; │     │  │  ├─ [PUC\DOCs\Notes\Note-{GUID}\Entry001\Content] <135-6> | 笔记正文
; │     │  │  └─ [PUC\DOCs\Notes\Note-{GUID}\Entry001\References] <136-6> | 关联引用
; │     │  ├─ [PUC\DOCs\Notes\Note-{GUID}\Entry002] <137-5> | 更多笔记条目
; │     │  │  ├─ [PUC\DOCs\Notes\Note-{GUID}\Entry002\Content] <138-6> | 笔记正文
; │     │  │  └─ [PUC\DOCs\Notes\Note-{GUID}\Entry002\References] <139-6> | 关联引用
; │     │  └─ ...... <YYY-5> | 可扩展的其他条目
; │     ├─ [PUC\DOCs\Notes\Note-{GUID}] <13A-4> | 更多笔记主题
; │     │  └─ ...... <YYY-5> | 可扩展的条目
; │     └─ ...... <YYY-3> | 可扩展的其他笔记主题
; └─ [__Specification__] <ZZZ-Z> | 规范元数据
