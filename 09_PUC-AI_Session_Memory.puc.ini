; ============================================
; 09_PUC-AI_Session_Memory (v1.0)
; 说明：定义 AI Agent 会话记忆的结构规范
;       涵盖 SessionMemory 的分节结构、已定规则格式、
;       增量记录(DELTA)归档规则。
; 用途：Agent 启动时加载记忆文件，恢复跨会话上下文
; 基于规范：PUC注释增强规范 v3.0.6 + PUC文件集规范 v3.0.5.1
;        + PUC-AI载入文档规范 v1.0 (06规范)
;        + PUC-AI_Knowledge_Base v1.0 (08规范)
; __note__ = <[1-9][0-9]?-[1-9]?> | E10-E30 号段
; 制定时间：2026-05-23
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留，通常不用。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID

; ================ AGENT 认知体系根节 ================
[PUC\AGENT]
__note__ = <E00-2> Agent认知体系根节 | 与08规范共用。KnowledgeBase管"知"，SessionMemory管"记"。
PUC\AGENT_GUID = {5A25D34A-32CF-46D4-B88E-C7A6BF5FBB4F} | 全局保留GUID
Architecture:架构 =
    [PUC\AGENT]
     ├─ [KnowledgeBase] 语义层 | 定义于08规范
     └─ [SessionMemory] 上下文层 | 本规范定义

; ================ SessionMemory 会话记忆规范 ================
[PUC\AGENT\SessionMemory]
__note__ = <E10-3> Agent会话记忆规范 | 定义跨会话上下文恢复的结构标准
PUC\AGENT\SessionMemory_GUID = {CD6FAD1D-16C3-4401-9E94-24475893989A} | 节名GUID
Purpose:用途 = 为Agent提供跨会话上下文恢复的存储规范 | 包含环境快照、已定规则、文件引用、维护者偏好、增量记录
Architecture:架构 =
    [PUC\AGENT\SessionMemory]
     ├─ [BOOT]        启动元数据
     ├─ [CONTEXT]     环境快照
     ├─ [Rules]       已定规则（用户设定）
     ├─ [CoreRules]   AI操作核心规则（规范提取）
     ├─ [References]  文件引用索引
     ├─ [Maintainer]  维护者信息与偏好
     │   └─ [huanzuo]
     └─ [DELTA]       会话增量记录
         ├─ [YYYYMMDD]
         │   ├─ [TOPIC1]
         │   └─ [TOPIC2]
         └─ ...
SubfileMode:子文件模式 = Subfile | 实际内容写入独立记忆文件并通过MountFile挂接
MountFile:挂载声明 = AI_Session_Memory.puc.ini | 前缀=<MemoryDir> | 记忆文件挂载点
LoadTiming:加载时机 = 启动时在KnowledgeBase之后加载 | 复活载入口诀中的MEM位
Constraint:与KnowledgeBase的关系 = KnowledgeBase存"不变的知识"，SessionMemory存"积累的记忆" | 知识库只增不减，记忆可老化可精简

[PUC\AGENT\SessionMemory\BOOT]
__note__ = <E11-4> 记忆文件启动元数据规范
PUC\AGENT\SessionMemory\BOOT_GUID = {D9ECC9D8-92C7-40A7-9CB7-C33583188FA3} | 节名GUID
Purpose:用途 = 记录记忆文件版本、作者、PUC规范版本链、生成和修订日期
RequiredKeys:必须定义的键 =
    Version:版本 = 记忆文件版本号
    Author:作者 = AI模型标识
    Purpose:用途 = 会话记忆恢复
    Date:生成日期 = 首次创建日期
OptionalKeys:可选键 =
    PUCVersion:PUC规范版本链 = 依赖的PUC规范版本
    RevisionDate:修订日期 = YYYY-MM-DD | 最后修订
    SubfileMode:子文件模式 = Subfile
Example:示例 =
    Version:版本 = 2.0 | AGENT体系重构正式版
    Author:作者 = DeepSeek AI (V4)
    PUCVersion:PUC规范版本链 = 01v3.0.6 + 02v3.0.5.1 + 06v1.0 + 07v1.0
    Purpose:用途 = 会话记忆恢复 | 下次会话时注入上下文
    Date:生成日期 = 2026-05-14
    RevisionDate:修订日期 = 2026-05-23 | AGENT体系重构

[PUC\AGENT\SessionMemory\CONTEXT]
__note__ = <E12-4> 环境快照规范 | 记录当前协作环境的完整描述
PUC\AGENT\SessionMemory\CONTEXT_GUID = {6C4B70ED-F384-4A8A-AAB0-B212893037F4} | 节名GUID
Purpose:用途 = 恢复环境信息，确保跨会话的工具/路径/平台一致性
RequiredKeys:建议定义的键 =
    HostOS:主机操作系统 = 维护者主工作机信息
    RuntimeOS:运行操作系统 = AI运行宿主机信息
    Client:客户端 = AI客户端名称和版本
    Workspace:工作目录 = 工作空间绝对路径
    OutputDir:输出目录 = 文档输出路径
    Encoding:编码 = 文件编码格式
OptionalKeys:可选键 =
    ToolDir/SpecDir/PowerShellDir等路径变量
    Git/GitHubCLI等工具版本
    Language:语言 = 思考和回复语言
KeyFormat:键名格式 = CamelCase英文+冒号+中文注释 | 值注释补充说明
Example:示例 =
    HostOS:主机操作系统 = Windows 7 x64 | 维护者主工作机
    RuntimeOS:运行操作系统 = Windows 10 | AI运行宿主机
    Client:客户端 = DeepSeek TUI v0.8.38

[PUC\AGENT\SessionMemory\Rules]
__note__ = <E13-4> 已定规则规范 | 用户明确设定的行为约束
PUC\AGENT\SessionMemory\Rules_GUID = {840C2965-44D1-485D-B3F5-B6F5569008A2} | 节名GUID
Purpose:用途 = 存储用户在本次会话中明确设定的规则，下次注入时Agent必须遵守
EntryFormat:条目格式 =
    键名 = RuleN:规则简述 | N从1开始递增
    键值 = 规则详细描述 | 值注释=规则分类标签
OrderingRule:排序规则 = 按规则编号递增
IncrementRule:增量规则 = 新规则追加在末尾 | 修改规则保留原编号追加修订说明
Constraint:约束 = 规则具有强制性，Agent必须遵守 | 冲突时最新规则优先
Example:示例 =
    Rule1:规则1 = 未授权不得随意访问任何目录和文件 | 访问约束
    Rule2:规则2 = 工作目录为D:\Share\AI_Files，内部称呼"文件池" | 工作空间定义

[PUC\AGENT\SessionMemory\CoreRules]
__note__ = <E14-4> AI操作核心规则规范 | 从PUC规范中提取的Agent行为约束
PUC\AGENT\SessionMemory\CoreRules_GUID = {8E63BAC9-18BF-4F02-B158-7324E9599305} | 节名GUID
Purpose:用途 = 存储从PUC规范（特别是01规范的ParsingRules）中提取的Agent行为约束
RequiredKeys:必须定义的键 =
    Enabled:启用 = TRUE/FALSE | 规则集启用标识
    RuleCount:规则数 = N | 核心规则数量
EntryFormat:条目格式 =
    RuleN:英文规则名 = 中文描述 | 补充说明或来源标注
Example:示例 =
    Enabled:启用 = TRUE
    RuleCount:规则数 = 3
    Rule1:轻量运行时 = Lightweight Runtime | 保持高效，不过度消耗
    Rule3:PUC阅读理解 = AI读取PUC文档时必须理解所有内容包括注释

[PUC\AGENT\SessionMemory\References]
__note__ = <E15-4> 文件引用索引规范 | 指向关联文件的引用列表
PUC\AGENT\SessionMemory\References_GUID = {718C12BC-E200-4B4A-90D3-18D3A0349D55} | 节名GUID
Purpose:用途 = 索引本次会话中涉及的所有关联文件，供Agent快速定位
EntryFormat:条目格式 =
    键名 = 分类前缀+序号:描述 = 相对路径
    分类前缀建议：SpecFile(规范)、KnowledgeFile(知识库)、ToolFile(工具)、ScriptFile(脚本)、LogFile(日志)
    路径使用相对于工作目录的相对路径
    值注释 = 文件用途说明
Example:示例 =
    SpecFile1:规范1 = 01_PUC注释增强规范(v3.0.6).puc.ini | PUC语法核心规范
    KnowledgeFile1:知识库 = AI_Knowledge_Base.puc.ini | 术语表与知识点

[PUC\AGENT\SessionMemory\Maintainer]
__note__ = <E16-4> 维护者信息规范 | Agent协作时对齐语气和技术取向
PUC\AGENT\SessionMemory\Maintainer_GUID = {991D3E4F-143B-41D2-A257-8A84290F4D91} | 节名GUID
Purpose:用途 = 记录维护者身份和偏好，Agent据此对齐语气
RequiredKeys:必须定义的键 =
    UsersCount:维护用户数 = N
    UserName:用户名称 = GitHub用户名或昵称
SubSections:子节 = 每个维护者独立一个子节 [PUC\AGENT\SessionMemory\Maintainer\<用户名>]
MaintainerSubKeys:维护者子节键 =
    OS:常用操作系统
    Toolchain:工具集
    API:应用程序接口
    AIModel:AI模型
    Style:个人风格 | Conservative/Explicit等

[PUC\AGENT\SessionMemory\Maintainer\huanzuo]
__note__ = <E17-5> 维护者huanzuo偏好 | Agent协作时对齐语气和技术取向
PUC\AGENT\SessionMemory\Maintainer\huanzuo_GUID = {1CCB881E-14A8-4AD3-9AC2-67A306FF7FFA} | 节名GUID
OS:常用操作系统 = Windows 7 | 维护者主工作机
Toolchain:工具集 = VB5/6 + VC5/6
API:应用程序接口 = Win32
AIModel:AI模型 = GPT-4.1
Style:个人风格 = Conservative / Explicit

[PUC\AGENT\SessionMemory\DELTA]
__note__ = <E30-4> 会话增量记录规范 | 跨会话信息积累的核心容器
PUC\AGENT\SessionMemory\DELTA_GUID = {93AC88F6-4C4F-4571-BD5E-F125CDB8324D} | 节名GUID
Purpose:用途 = 每次会话的关键成果以日期为单位归档，支持跨会话增量积累
HierarchyRule:层级规则 =
    第一层：DELTA根节
    第二层：日期节 [YYYYMMDD] — 每个日期一个独立节
    第三层：主题节 [TOPIC] — 该日期的各主题子节
    第四层及以上：子主题 — 按需扩展
DateSectionFormat:日期节格式 =
    节名：[PUC\AGENT\SessionMemory\DELTA\YYYYMMDD]
    __note__ = 日期概述
    Date:日期 = YYYY-MM-DD
    Summary:概述 = 当日会话概述
TopicSectionFormat:主题节格式 =
    节名：[PUC\AGENT\SessionMemory\DELTA\YYYYMMDD\TOPICNAME]
    __note__ = 主题概述
    具体键值按主题需求自定义
OrderingRule:排序规则 =
    日期节按时间倒序（新在上，旧在下）| 方便Agent优先读取最新记忆
    同日期内主题节按重要性或发生顺序排列
IncrementRule:增量规则 =
    每次会话结束时新建一个日期节
    日期节内至少包含一个主题节
    主题节键值自由定义，但建议包含 Summary/Date 等元数据键
Example:示例 =
    [PUC\AGENT\SessionMemory\DELTA60523]
    __note__ = <...> 2026-05-23 | IMPORT+AGENT重构
    Date:日期 = 2026-05-23
    Summary:概述 = 本日完成IMPORT规范和AGENT体系重构
    [PUC\AGENT\SessionMemory\DELTA60523\IMPORT]
    __note__ = <...> IMPORT详情

; ========== 规范元数据 ==========
[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节
__Specification___GUID = {55F7AF9A-1B28-4000-BEF7-C4EB9EF9AE1A} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <E30-4> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC-AI_Session_Memory
Version:规范版本 = 1.0
Date:制定日期 = 2026-05-23
BasedOn:基础规范 = PUC注释增强规范 v3.0.6 + PUC-AI载入文档规范 v1.0 + PUC文件集规范 v3.0.5.1 + PUC-AI_Knowledge_Base v1.0
Description:描述 = 定义AI Agent会话记忆的结构规范，涵盖SessionMemory根节(E10-3)及其七个子节：BOOT(启动元数据 E11-4)、CONTEXT(环境快照 E12-4)、Rules(已定规则 E13-4)、CoreRules(AI操作规则 E14-4)、References(文件引用 E15-4)、Maintainer(维护者信息 E16-4→huanzuo E17-5)、DELTA(增量记录 E30-4及日期/主题子节)。挂接于[PUC\AGENT] <E00-2>下，构成Agent认知体系的上下文层。遵循PUC三层注释规范和MountFile挂载机制。
