__note__ = <127-5> 编码处理与文件格式 | 2026-03-28
PUC\DOCs\Archives\Thread001_GUID = {C24CF0C1-9F7F-4460-AAC3-D26FEB63DFD4} | 第一个线程的GUID
Summary:摘要 = INI文件编码检测与UTF-8处理策略
UserQuery:用户的原始提问 = 讨论Windows 7记事本支持的编码格式，UTF-8 with BOM vs without BOM的区别
AIAnalysis:AI对用户意图的分析 = 用户需要处理INI文件的编码问题，确保跨平台兼容性
AIResponseSummary:AI给出的回答摘要 = ANSI编码为系统默认（Windows 7简体中文系统为GBK）；UTF-8 with BOM在文件头有3字节标识符，without BOM是纯内容。无BOM UTF-8需要依赖内容特征检测（如高字节字符模式）。SplitString函数需处理vbCrLf和vbLf两种换行符。
KeyPoint1:核心要点1 = 编码优先级：ANSI(GBK) > UTF-8 BOM > UTF-8 noBOM > UTF-16
KeyPoint2:核心要点2 = UTF-8 BOM为EF BB BF三字节，标识符放在文件开头
KeyPoint3:核心要点3 = "韭菜合子"比喻：浏览器/Electron应用的嵌套层级现象
KeyPoint4:核心要点4 = Windows API：GetPrivateProfileString、WritePrivateProfileString操作INI

