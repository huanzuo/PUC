[PUC\DOCs\Archives\Archive-{AAA5D1D4-2C7A-4EAD-BB45-AABB1ABEFEA6}\Thread001]
__note__ = <135-5> OLE与COM基础 | 2026-03-29
PUC\DOCs\Archives\Thread001_GUID = {52743247-9FC6-42F8-921F-EE7604D42B35} | 第一个线程的GUID
Summary:摘要 = OLE技术的基本概念与应用场景
UserQuery:用户的原始提问 = OLE是什么？它和COM是什么关系？
AIAnalysis:AI对用户意图的分析 = 用户想理解Windows组件对象模型的历史与技术细节
AIResponseSummary:AI给出的回答摘要 = OLE（Object Linking and Embedding）是1990年代微软的组件技术，用于在应用程序间嵌入和链接对象。OLE基于COM（组件对象模型），后者定义了组件交互的二进制标准。嵌入是将对象完整复制到目标文档，链接是保持与源文件的引用关系。ActiveX是OLE的Internet扩展。
KeyPoint1:核心要点1 = OLE：应用程序间对象共享的技术标准
KeyPoint2:核心要点2 = COM：组件交互的二进制标准，OLE的技术基础
KeyPoint3:核心要点3 = 嵌入vs链接：完整复制vs保持引用
KeyPoint4:核心要点4 = ActiveX：OLE的Internet扩展，用于Web控件

