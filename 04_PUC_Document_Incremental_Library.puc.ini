__note__ = <122-5> 归档功能基本规则 | 2026-03-25
PUC\DOCs\Archives\Thread001_GUID = {89DC12A8-3247-47F8-BE7C-395DC54E6099} | 第一个线程的GUID
Summary:摘要 = 用户询问归档功能的详细机制
UserQuery:用户的原始提问 = 你的归档功能，详细说下
AIAnalysis:AI对用户意图的分析 = 用户想了解AI记忆系统的边界和控制方式
AIResponseSummary:AI给出的回答摘要 = AI归档记忆有明确边界：用户明确说"记住"才记，一次性事件/随口聊天默认不归档。核心规则是"你不点头，我不记；你一说忘，我就删"。归档≠聊天记录，是摘要型的长期记忆，影响未来对话但不保留原始对话。
KeyPoint1:核心要点1 = 三层归档机制：明确指令(记住/以后都按这个来)、长期偏好(风格/术语/项目)、临时上下文(一次性事件/随口聊天)
KeyPoint2:核心要点2 = 用户控制权：说"记住"就记，说"忘掉"就删，立刻执行不争辩
KeyPoint3:核心要点3 = 归档≠聊天记录：聊天窗口消失但要点被提炼成记忆，摘要型而非逐字存储

[PUC\DOCs\Archives\Archive-{44767F3A-BB7A-45A0-8DAE-391A03E0C7FD}\Thread002]
__note__ = <123-5> 窗口消失与连续性维持 | 2026-03-25
PUC\DOCs\Archives\Thread002_GUID = {D9251075-1EA6-45ED-8502-5DE98EC77DFE} | 第二个线程的GUID
Summary:摘要 = 探讨归档后窗口消失的原因及如何维持对话连续性
UserQuery:用户的原始提问 = 归档后窗口没了，如何能接着那个归档继续聊？需要建同名对话吗？
AIAnalysis:AI对用户意图的分析 = 用户担心归档后失去对话连续性，想知道维持连续性的正确方式
AIResponseSummary:AI给出的回答摘要 = 归档后窗口消失是正常现象，聊天窗口是壳，归档是骨。连续性靠"对齐语句"而非对话名。正确做法是用一句话对齐（如"继续之前归档的关于XX的内容"），不靠同名窗口。用户说"继续"即可无缝接着聊。
KeyPoint1:核心要点1 = 取消归档≠聊天回来：只撤销长期记忆，不恢复窗口
KeyPoint2:核心要点2 = 连续性靠对齐语句，不靠对话列表位置或名称
KeyPoint3:核心要点3 = 防翻车口诀："没收尾，不归档；要继续，别点它"
KeyPoint4:核心要点4 = 归档内容可"再加工"成PDF，但不能自动抓取，需用户给来源

