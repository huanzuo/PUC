AIAnalysis:AI对用户意图的分析 = 用户想了解全球插花艺术的文化分类与美学特征
AIResponseSummary:AI给出的回答摘要 = 世界插花文化可分为四大体系：东方体系（中/日/朝）重意境、线条、留白；欧洲古典体系（法/意/荷/英）重对称、比例、丰满；美式现代体系功能优先、商业场景；当代国际体系跨文化融合、观念表达。从美学角度分为：线性体系（东方、北欧）、量感体系（欧洲古典、美式商业）、空间体系（当代装置）。
KeyPoint1:核心要点1 = 东方体系：意境、线条、留白、节制
KeyPoint2:核心要点2 = 欧洲古典体系：对称、比例、丰满
KeyPoint3:核心要点3 = 美式现代体系：功能、商业、场景
KeyPoint4:核心要点4 = 当代国际体系：跨文化、观念表达
KeyPoint5:核心要点5 = 一句话总结："东方看意，欧洲讲形，美国重用，当代追观念"

