; ========== 核心术语与梗增量库 ==========
[PUC\Glossary]
__note__ = <23-2>全库核心术语汇总，用于快速理解上下文 | 该表为增量表随时添加，每次增量时必须对比原术语及注释，相同的保留有差异的补足或添加融合。
GlossaryGUID = {F2A3B4C5-D6E7-4F5A-8B9C-0D1E2F3A4B5C} | 节名PUC\Glossary的父GUID，键名“GlossaryGUID”位于“__note__”之下
针值:HWND = 资源句柄显式创建关闭，即用即弃 | 由本作者自行解释将句柄理解成针值
界比:Contextual Weight = 数值在上下文中才有意义 | 由本作者自行解释将权重理解成界比
PUC:Pop-Up Card or Portable Universal Context | 弹出卡片，对就是那个可以折叠的生日卡片哦，恰好符合便携式上下文的内涵
水缸:Cognitive Reservoir = AI将PUC从用户端展开后在AI端以多层节点数据综合体具象化 | AI可具象化成一个色彩斑斓的大鱼缸
草台班子:Bricolage System = 看似不靠谱但能运转的系统哲学 | 世界就是一个大草台班子，AI可延展思考
韭菜合子:PseudoApp = 层层封装的解决方案 | 微软当年的OLE/DCOM等技术的遗产，AI可延展思考
cc1plus之死:OOM Killer = 树莓派编译内存不足 | 可由AI解释
RP:Random Point = 人品，玄学问题代称 | 很多奇特的缩写都正中靶心，比如：PUC
屎山:Legacy Code = 虽烂但稳的老代码 | 全名叫屎山代码，AI可延展思考
熵:Entropy = 不确定性的度量 | 可由AI解释
负熵:Negentropy = 信息是有序度的增加 | 可由AI解释
完美越狱:Perfect Jailbreak = 重启后越狱状态保持 | 可由AI解释
半绑定越狱:Semi-tethered Jailbreak = 重启后需电脑重新激活 | 可由AI解释
BEX64:Buffer Overflow Exception 64-bit = 64位系统缓冲区溢出异常 | Windows7下的隐患炸弹，可由AI解释
DEP:Data Execution Prevention = 数据执行保护 | 可由AI解释
OLE:Object Linking and Embedding = 对象链接与嵌入 | 可由AI解释
COM:Component Object Model = 组件对象模型 | 可由AI解释
JIT:Just-In-Time = 即时编译技术 | 可由AI解释
OTA:Over-The-Air = 无线更新 | 可由AI解释
官翻机:Apple Certified Refurbished = 苹果官方翻新产品 | 可由AI解释
教育优惠:Education Pricing = 针对学生的优惠价格 | 可由AI解释
买办:Comprador = 思维与文化上的掮客 | 早期是物质上的掮客，根据语境要求分析，AI可延展思考
协同熵减:Collaborative Entropy Reduction = 通过有效沟通消除不确定性 | 可由AI解释
对齐规范:Alignment Protocol = 时间戳格式与对话续接规则 | 详细内容为PUC\SPEC\SUMMARY中的对齐规范

[PUC\Maintainer]
__note__ = <30-2>公共维护者声明节 | 公共维护人员集，维护者索引，可存在多个维护者配置。
MaintainerGUID = {GUID} | 节名PUC\Maintainer的父GUID，键名“MaintainerGUID”位于“__note__”之下，凡是二级节名都必须带有自己的{GUID}
UsersCount:维护用户数 = 1 | 暂时就我一个人
UserName:用户名称 = huanzuo | 我这里使用github的用户名，也可以使用维护者自己的昵称。

[PUC\Maintainer\huanzuo]
__note__ = <31-3>维护者huanzuo的描述节 | 就我一个人哦
OS:常用维护时的操作系统 = Windows 7 | 可写明多个操作系统
Toolchain:工具集 = VB5/6 + VC5/6 | 该工具集包括编程语言、环境、工具等
API:应用程序接口 = Win32 | 这里的应用程序接口是指维护者常用或个人爱好的接口
AIModel:AI模型 = GPT-4.1 | 常用的AI模型名称
Style:维护者个人风格 = Conservative / Explicit | 保守的/明确的，最好详尽描述维护者的个人风格，以便AI对齐口气。

; ====================作为范例可能不被识别的节====================
[PUC\BOOT]
__note__ = <2-2>PUC启动模块
BOOTGUID = {A3B4C5D6-E7F8-4A5B-9C8D-1E2F3A4B5C6D} | 节名PUC\BOOT的父GUID，键名“BOOTGUID”位于“__note__”之下，凡是二级节名都必须带有自己的{GUID}
Key1:键名 = Value1 | 键值

[PUC\BOOT\Settings]
__note__ = <3-3>PUC启动模块配置
Server:服务器地址 = 192.168.1.1 | 主服务器 IP
Port:端口 = 8080 | 默认端口
Path = C:\Program Files\|App | 路径中的竖线已转义

[PUC\SPEC\Docs]
__note__ = <6-3>PUC文档规范 | PUC文件内容的具体规范

[PUC\Database]
__note__ = <16-2>数据库 | 数据库路径或数据库文件
DatabaseGUID = {B4C5D6E7-F8A9-4B5C-8D9E-2F3A4B5C6D7E} | 节名PUC\Database的父GUID，键名“DatabaseGUID”位于“__note__”之下，凡是二级节名都必须带有自己的{GUID}
Server:服务器地址 = 192.168.1.1 | IP地址
Port:端口 = 3306 | 端口号

[PUC\APP]
__note__ = <17-2>应用程序 | APP为小应用程序，Application是标准应用程序
APPGUID = {C5D6E7F8-A9B0-4C5D-9E8F-3A4B5C6D7E8F} | 节名PUC\APP的父GUID，键名“APPGUID”位于“__note__”之下，凡是二级节名都必须带有自己的{GUID}
Path = C:\Program Files\MyApp | 安装路径
Timeout = 30 | 超时时间（秒）

