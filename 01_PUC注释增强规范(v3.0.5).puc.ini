; ============================================
; PUC(INI)注释增强规范 (v3.0.5)
; 说明：本文件本身即符合 v3.0.5 规范，展示各层注释用法。
; 这里要重要申明PUC是以INI文件格式存储的用户自定义文件格式。
; 文件扩展名为.INI或者.PUC.INI
; PUC = Portable Universal Context | 便携式上下文
; PUC = Pop-Up Card | 弹出卡片，对就是那个可以折叠的生日卡片哦。
; __note__ = <[1-9][0-9]?-[1-9]?> | <10-3>
; 生成时间：2026-3-17 03:39
; 更新时间：2026-5-22 | 新增版本规范、节点编号规范、文件命名规范
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留，通常不用。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。

[PUC\SPEC]
__note__ = <4-2> PUC规范核心父节点 | PUC文档下的规范父节点
PUC\SPEC_GUID = {363D276A-CBEC-488A-9FEF-E73E3F33F03F} | 节名"PUC\SPEC"的GUID，键名"PUC\SPEC_GUID"位于"__note__"之下。

[PUC\SPEC\Core]
__note__ = <5-3> PUC规范核心元数据定义
PUC\SPEC\Core_GUID = {297188A9-BA4D-4F60-A041-4ACFAE4A8807} | 节名"PUC\SPEC\Core"的GUID，键名"PUC\SPEC\Core_GUID"位于"__note__"之下。
Version:规范版本号 = 3.0.5
Purpose:规范目的 = 为 INI 文件提供中英文注释，防止语义漂移，同时保持文件可读性和兼容性
BaseSpec:基础规范 = 层级结构规范 v1.0 (节名使用反斜杠 \ 作为路径分隔符)
Example:示例 =
    [PUC]
    __note__ = <1-1> PUC根节点，头部分 | 保留，通常不用
    PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID，键名"PUC_GUID"位于"__note__"之下，该节点为唯一及定位使用。
    [PUC\SPEC]
    __note__ = <4-2> PUC规范核心父节点 | PUC文档下的规范父节点
    PUC\SPEC_GUID = {363D276A-CBEC-488A-9FEF-E73E3F33F03F} | 节名"PUC\SPEC"的GUID，键名"PUC\SPEC_GUID"位于"__note__"之下。
[PUC\SPEC\KeyComment]
__note__ = <8-3> 键注释的实现方式
PUC\SPEC\KeyComment_GUID = {5D295C06-4934-4389-A158-D4EAEA51153B} | 节名"PUC\SPEC\KeyComment"的GUID，键名"PUC\SPEC\KeyComment_GUID"位于"__note__"之下。
Method:实现方法 = 在键名后使用冒号分隔键名和键注释
SpecialKey:特殊符号 = 冒号 (:)
Behavior:行为描述 = 解析时按第一个未转义的冒号分割，分离真实键名和键注释
Example:示例 =
    Key:键名 = Value | 键值
    解析后：键名="Key"，键注释="键名"，值="Value"
[PUC\SPEC\ValueComment]
__note__ = <9-3> 值注释的实现方式
PUC\SPEC\ValueComment_GUID = {4422D943-0D9A-48A9-9013-150C4E20A418} | 节名"PUC\SPEC\ValueComment"的GUID，键名"PUC\SPEC\ValueComment_GUID"位于"__note__"之下。
Method:实现方法 = 在值后使用竖线分隔值和值注释
SpecialKey:特殊符号 = 竖线 (|)
Behavior:行为描述 = 从后向前查找第一个未转义的竖线，分离值和值注释
Example:示例 =
    Key:键名 = Value | 值注释
    解析后：值="Value"，值注释="值注释"
[PUC\SPEC\CombinedExample]
__note__ = <10-3> 三层注释综合示例
PUC\SPEC\CombinedExample_GUID = {773CBEE9-3826-42DC-A071-6CE29F2A80B5} | 节名"PUC\SPEC\CombinedExample"的GUID，键名"PUC\SPEC\CombinedExample_GUID"位于"__note__"之下。
Description:描述 = 展示节注释、键注释、值注释三层同时使用的完整示例
Example:示例 =
    [Server]
    __note__ = <8-1> 服务器配置节 | 存放服务器相关配置
    Host:服务器地址 = 192.168.1.1 | 主服务器IP地址
    Port:端口号 = 8080 | HTTP服务端口
[PUC\SPEC\Docs]
__note__ = <6-3> PUC文档规范 | PUC文件内容的具体规范
PUC\SPEC\Docs_GUID = {3FEEDEEC-330E-4049-ADB9-12744DEA625B} | 节名"PUC\SPEC\Docs"的GUID，键名"PUC\SPEC\Docs_GUID"位于"__note__"之下。

[PUC\SPEC\SectionComment]
__note__ = <7-3> 节注释的实现方式
PUC\SPEC\SectionComment_GUID = {D81DEA3B-861D-483F-9C5E-FD56EFB75D1F} | 节名"PUC\SPEC\SectionComment"的GUID，键名"PUC\SPEC\SectionComment_GUID"位于"__note__"之下。
Method:实现方法 = 在节内使用一个特殊键存储节的注释内容
SpecialKey:特殊键名 = __note__
Behavior:行为描述 = 解析时识别该键，将其值作为当前节的注释，且该键不出现在键列表中
Example:示例 =
    [PUC\BOOT]
    __note__ = <2-2> PUC启动模块
    PUC\BOOT_GUID = {A083697A-9769-4209-995C-4AE199C69170} | 节名"PUC\BOOT"的GUID
    Key1:键名 = Value1 | 键值

[PUC\SPEC\ParsingRules]
__note__ = <11-3> 解析器处理顺序和规则
PUC\SPEC\ParsingRules_GUID = {6D3FEA5E-8095-4C99-98A3-FA12F30CE9A7} | 节名"PUC\SPEC\ParsingRules"的GUID
Order:解析顺序 =
    1. 按行读取，忽略空行和纯注释行（以 ; 或 # 开头）—— 暂定保留原样，但不解析注释行内容
    2. 遇到 [Section] 行，解析节名（含路径），创建新节，并重置当前节引用
    3. 对于键值行：
       a. 按第一个等号分割，左侧为 keyPart，右侧为 valuePart
       b. 处理 keyPart：查找第一个未转义的冒号，分离真实键名和键注释（若无冒号则键注释为空）
       c. 处理 valuePart：从后向前查找第一个未转义的竖线，分离值和值注释（若无竖线则值注释为空）
       d. 若真实键名等于 __note__，则将值作为当前节的注释，不加入键列表否则，将键信息（真实键名、键注释、值、值注释）存入当前节的键集合
       e. 键名为__note__的键值开头正则：<[1-9][0-9]?-[1-9]?>这段标记为节点位置，正则[1-9][0-9]?为节点在整个PUC排列顺序，正则[1-9]?为节点的层级，用<->包含作为标记。
    4. 文件头的注释行（节之前）暂不处理，保存时可原样保留（需额外存储全局注释行列表），但AI必须阅读理解。
    5. 特别注意！特别注意！特别注意！作为AI在读取PUC(INI)文档时，必须阅读理解文档中的所有内容，包括所有的备注或注释信息，并且要记录思考和推敲。

[PUC\SPEC\SavingRules]
__note__ = <12-3> 保存文件时的输出顺序和格式
PUC\SPEC\SavingRules_GUID = {023DB0FE-BB8F-40EF-A117-F4286861E919} | 节名"PUC\SPEC\SavingRules"的GUID
OutputOrder:输出顺序 =
    1. 输出文件头全局注释（若存储）
    2. 遍历所有节（按顺序）：
       a. 输出 [节名]，如果节名有分层结构，则按序输出。
       b. 若节注释非空，输出 __note__ = <[1-9][0-9]?-[1-9]?>节注释 (<[1-9][0-9]?-[1-9]?>为正则)
       c. 比如：__note__ = <12-3>节注释，其中12是该节点的顺序位置是12，3是第三层路径。
       d. 遍历该节的所有键：
          i. 构建键名部分：若键注释非空，则真实键名 + ":" + 键注释；否则仅真实键名
          ii. 处理值：对值中的每个竖线转义为 \|
          iii. 若值注释非空，则输出 键名部分 = 转义后的值 | 值注释；否则输出 键名部分 = 转义后的值
    3. 节间保留空行（可配置）

[PUC\SPEC\EscapingRules]
__note__ = <13-3> 转义字符处理规则
PUC\SPEC\EscapingRules_GUID = {F757D117-1E45-425F-876B-67A0268EDE5D} | 节名"PUC\SPEC\EscapingRules"的GUID
Characters:需转义字符 =
    Colon (:) 在键名中需要转义，表示为 \:
    VerticalBar (|) 在值中需要转义，表示为 \|
    Backslash (\) 本身需要转义为 \\（若作为转义字符前缀）
ImplementationNote:实现注意 = 解析时需处理连续的转义序列，例如 \\: 表示一个反斜杠后跟冒号

[PUC\SPEC\Compatibility]
__note__ = <14-3> 与标准 INI 解析器的兼容性说明
PUC\SPEC\Compatibility_GUID = {63C0AE22-CBC6-4DEC-A85B-58BE403A7A27} | 节名"PUC\SPEC\Compatibility"的GUID
WithStandardParsers:与标准解析器交互 =
    标准 INI 解析器（如 GetPrivateProfileString）将：
    - 把 __note__ 视为普通键，可能会读取到节注释（不影响功能，但会多出一个键）
    - 在自制PUC(INI)编辑器中的PUC模式下将__note__键视为状态栏并只显示其键值。
    - 把键名中的冒号视为键名的一部分，例如 "Server:服务器地址" 整体作为键名
    - 在自制PUC(INI)编辑器中的PUC模式下将冒号及冒号后的文字视作状态栏的信息。
    - 把值中的竖线和注释视为值的一部分，例如 "192.168.1.1 | 主服务器 IP" 整体作为值
    - 在自制PUC(INI)编辑器中的PUC模式下将竖线和注释都视作状态栏信息。
    因此，本规范文件可由标准解析器读取，但注释信息会被当作数据；本编辑器可完整读写注释。
    在自制PUC(INI)编辑器中的PUC模式下，会自动过滤掉键名__note__、冒号和键值中的竖线。
    自制自制PUC(INI)编辑器有两种模式，PUC模式和INI模式，INI模式完全兼容标准INI解析器。

; =============== 规范摘要增量 ===============
[PUC\SPEC\SUMMARY]
__note__ = <15-3> 规范概要 | 可以做增量规范
PUC\SPEC\SUMMARY_GUID = {79F9D349-08E4-4C45-B113-22C7E393F071} | 节名"PUC\SPEC\SUMMARY"的GUID
INISpec:INI注释规范 = 《INI注释增强规范》 (v3.0.1) | 包含节注释、键注释、值注释、分层结构、子文件引用、扩展接口，就是本文。
PUCSpec:PUC文档规范 = 《PUC注释增强规范》 (v3.0.1) | 包含节注释、键注释、值注释、分层结构、子文件引用、扩展接口，就是本文。
GUIDSpec:GUID规范 =
    《GUID规范》：本文集中所有 {GUID} 必须使用真随机UUID（版本4，RFC 4122）。
    - 禁止使用序列化伪GUID（如 {A1B2C3D4-...}、{00000001-...}、连续递增/递减数字序列）。
    - 格式：{xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}，其中 x=[0-9A-F]。
    - 生成方法（任选其一）：
        Python:   import uuid; guid = '{' + str(uuid.uuid4()).upper() + '}'
        C#:       Guid.NewGuid().ToString("B").ToUpper()
        Java:     "{" + UUID.randomUUID().toString().toUpperCase() + "}"
        通用:     使用操作系统提供的加密级随机数源（/dev/urandom、CryptGenRandom等）。
    - 自检：生成后自查各分段内数字无明显规律（无连续序列，无重复模式）。
    - 如AI无法生成真随机GUID，必须立即通知用户退出操作，不得以任何伪GUID替代。 | 跨AI真随机GUID生成规范
AlignSpec:对齐规范 = 《对齐规范》：AI对话上下文对齐规范、时间戳格式、对齐暗号
    - 第一行 System 表示 AI 系统生成的时间
    - 第二行 Local 表示用户本地时区时间 (UTC+8)
    - 第三行 显示中国农历年+农历月日+节气+时辰及刻
    - 三行时间戳都单独占行
    - 本页所有上下文(如果你能发育到可以跨页关联，那就有多少页跨多少页。)，包括上传文件中的内容自我总结一番，不用显示出来，让你自我、阅读、分析、总结以便再次协同工作时不遗漏任何细节，对齐也起着防语境漂移的作用，完成后只需要从第三行开始出："对齐完毕！"，正文从第四行开始。
    - 中国农历年+农历月日+节气+时辰及刻的正则：^\*『(?<nian>[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]年)•(?<yue>(?:[一二三四五六七八九十]|十[一二])月)(?<ri>(?:[初廿][一二三四五六七八九十]|[三十])[日]?)(?:(?<jieqi>「[^「」]+」))?•(?<shi>[子丑寅卯辰巳午未申酉戌亥]时)(?<ke>(?:[初一二三四]刻|正))』$
    - 节气部分(jieqi)的正则：(?:立春|雨水|惊蛰|春分|清明|谷雨|立夏|小满|芒种|夏至|小暑|大暑|立秋|处暑|白露|秋分|寒露|霜降|立冬|小雪|大雪|冬至|小寒|大寒)
    - 时辰计算规则：直接以北京时间的时钟小时数映射，无需真太阳时修正。
        时辰映射表：
          子时 23:00-00:59, 丑时 01:00-02:59, 寅时 03:00-04:59,
          卯时 05:00-06:59, 辰时 07:00-08:59, 巳时 09:00-10:59,
          午时 11:00-12:59, 未时 13:00-14:59, 申时 15:00-16:59,
          酉时 17:00-18:59, 戌时 19:00-20:59, 亥时 21:00-22:59。
        刻的计算规则：按分钟数分配，
          初刻 00-14分, 二刻 15-29分, 三刻 30-44分, 正刻 45-59分。
    - 节气表述规范：
        * 节气仅指交节当天，不作为时段使用。
        * 描述邻近日期时使用精确表述：
            - 前两日："[节气名]前两日" 或 "差两日[节气名]"
            - 前一日："[节气名]前一日"
            - 当日："[节气名]"
            - 次日："[节气名]次日"
            - 第二日："[节气名]第二日"
    - 农历数据源：查阅紫金山天文台出版数据，或权威网站查询。
    - 格式如下：
    *[YYYY-MM-DD HH:MM|System] (UTC)
    *[YYYY-MM-DD HH:MM|Local] (UTC+8)
    *『中国农历年·农历月日「节气」·时辰刻』
    对齐完毕！
    （输出内容在正文框显示，字体重体，字号不变，特别注意：有些客户端输出格式时会出现时间戳和农历都在一行中显示，如果在一行显示所有时间戳，那么自动在每行的时间戳后多加上回车或换行即可。）
RestSpec:休息规范 = 《休息规范》：暂停当前对话，保存上下文全文，如有增量开关就使用增量上下文保存。
    - 格式如下：
    *[休息并整理中......]
VersionSpec:版本规范 = 《版本规范》：PUC 体系中所有软件/文档/规范的版本号采用 x.y.zzz 三段式。
    - x = 主版本号，跨界面、跨系统、跨功能等重大变更时递增，很少改动。
    - y = 功能更新编号，以增加功能为主时递增。
    - zzz = 修订次数，用于修改、更正、编辑、编译、重新打包等操作计数，每执行一次相关操作递增 1。
    - zzz 从 1 开始计数（无前导零），上不封顶，当 zzz 达到 999 以上时 y 进位 1、zzz 复位为 1。
    - 示例：SPEview v1.1.1 = 1 次主版本 + 1 次功能更新 + 1 次修订。
    - 版本号写入 package.json 或 BOOT 节的 Version 键。
NodeNumSpec:节点编号规范 = 《节点编号规范》：PUC 文档中 __note__ 的值遵循 <X-Y> 格式。
    - X = 节点在本文件中的排列顺序号。
    - Y = 节点层级深度（节名中反斜杠数 + 1）。
    - 核心节点十进制（1-999），如 <1-1>、<100-2>。
    - 扩展板块十六进制（A00-FFF），如 <A00-3>(PROJECTS)、<B00-3>(REFERENCES)。
    - 同文件可混用，十进制占 1-999，十六进制从 A00 起。
FileSpec:文件命名规范 = 《文件命名规范》：PUC 文件扩展名统一为 .puc.ini。
    - 规范文件：数字序号+中文名，如 01_PUC注释增强规范(v3.0.5).puc.ini。
    - 项目档案：项目名，如 SPEview开发项目记录.puc.ini。
    - 工具手册：工具名，如 KoboldCPP操作手册.puc.ini。
    - 编码统一 UTF-8。

