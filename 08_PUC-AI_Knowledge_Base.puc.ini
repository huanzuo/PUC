; ============================================
; 08_PUC-AI_Knowledge_Base (v1.0)
; 说明：定义 AI Agent 语义知识库的结构规范
;       涵盖 KnowledgeBase 的分节结构、键名格式、
;       术语条目定义、结论归档规则。
; 用途：Agent 启动时加载知识库文件，对齐术语和关键结论
; 基于规范：PUC注释增强规范 v3.0.6 + PUC文件集规范 v3.0.5.1
;        + PUC-AI载入文档规范 v1.0 (06规范)
; __note__ = <[1-9][0-9]?-[1-9]?> | C01-C04 号段
; 制定时间：2026-05-23
; ============================================

[PUC]
__note__ = <1-1> PUC标志根节点头部分 | 保留，通常不用。
PUC_GUID = {BDC7C3A5-EB99-4C9B-B89B-23A4BD1D43CA} | 节名"PUC"的GUID

; ================ AGENT 认知体系根节 ================
[PUC\AGENT]
__note__ = <C00-2> Agent认知体系根节 | KnowledgeBase(语义层)+SessionMemory(上下文层)的父节点。位于PUC\DOCs系之后(C/D号段)，构成Agent四维认知：元数据、知识、记忆、技能。
PUC\AGENT_GUID = {5A25D34A-32CF-46D4-B88E-C7A6BF5FBB4F} | 节名"PUC\AGENT"的GUID(全局保留)
Purpose:用途 = 为AI Agent提供结构化的认知容器 | 涵盖语义理解(KnowledgeBase)和上下文记忆(SessionMemory)
Architecture:架构 =
    [PUC\AGENT] 认知根节
     ├─ [KnowledgeBase] 语义层 — 术语正名+关键结论 | 回答"Agent懂什么"
     └─ [SessionMemory] 上下文层 — 环境+规则+增量记录 | 回答"Agent记得什么"
DesignPrinciple:设计原则 = Agent知道自己叫什么(元数据)、懂什么(KnowledgeBase)、记得什么(SessionMemory)、能做什么(SKILLS) | 四者构成完整认知画像
Relationship:与SKILLS的关系 = KnowledgeBase管"知"，SKILLS管"行" | 知→行顺序：先对齐认知再调用工具

; ================ KnowledgeBase 语义知识库规范 ================
[PUC\AGENT\KnowledgeBase]
__note__ = <C01-3> Agent语义知识库规范 | 定义术语消化和结论归档的结构标准
PUC\AGENT\KnowledgeBase_GUID = {7FE3FEAA-2BEA-4610-B046-F6F437759A1A} | 节名GUID
Purpose:用途 = 为Agent提供术语理解对齐和推理结论的存储规范 | 下次注入时快速对齐PUC生态认知
Architecture:架构 =
    [PUC\AGENT\KnowledgeBase]
     ├─ [BOOT]        启动元数据
     ├─ [Glossary]    术语正名消化
     └─ [Conclusions] 关键结论归档
SubfileMode:子文件模式 = Subfile | 本规范定义结构，实际内容写入独立知识库文件并通过MountFile挂接
MountFile:挂载声明 = AI_Knowledge_Base.puc.ini | 前缀=<MemoryDir> | 知识库文件挂载点
Example:知识库文件示例 =
    [PUC\AGENT\KnowledgeBase]
    __note__ = <C01-3> Agent语义知识库 | 内容文件
    PUC\AGENT\KnowledgeBase_GUID = {GUID}
    MountFile:挂载声明 = 本文件即挂载目标 | 前缀=<MemoryDir>
    (随后是BOOT/Glossary/Conclusions子节)

[PUC\AGENT\KnowledgeBase\BOOT]
__note__ = <C02-4> 知识库启动元数据规范 | 版本/来源/编码等身份信息
PUC\AGENT\KnowledgeBase\BOOT_GUID = {961CB080-2211-4B77-8340-F81D5BC284E8} | 节名GUID
Purpose:用途 = 记录知识库文件的版本、作者、知识来源、生成日期等启动元数据
RequiredKeys:必须定义的键 =
    Version:版本 = 知识库版本号 | 格式 x.y 或 x.y.z
    Author:作者 = AI模型标识 | 如 DeepSeek AI (V4)
    Purpose:用途 = 知识库用途说明
    Date:生成日期 = YYYY-MM-DD | 首次创建日期
    Encoding:编码 = UTF-8 | 文件编码格式
OptionalKeys:可选键 =
    PUCVersion:PUC规范版本链 = 引用的PUC规范版本
    RevisionDate:修订日期 = YYYY-MM-DD | 最后修订日期
    SourceN:知识来源N = 来源描述 | 日期 | 可定义多个(N=1,2,3...)
    SubfileMode:子文件模式 = None/Subfile | 子文件模式
KeyFormat:键名格式 =
    键名使用CamelCase英文，不含空格
    值注释(竖线后)用于补充说明
    知识来源使用SourceN递增编号
Example:示例 =
    Version:版本 = 1.0
    Author:作者 = DeepSeek AI (V4) | AI模型标识
    Purpose:用途 = 术语理解对齐 + 关键结论归档
    Date:生成日期 = 2026-05-23
    Source1:知识来源1 = PUC规范文件01-07号完整阅读 | 2026-05
    Encoding:编码 = UTF-8

[PUC\AGENT\KnowledgeBase\Glossary]
__note__ = <C03-4> 术语消化规范 | 定义术语条目的格式和分类
PUC\AGENT\KnowledgeBase\Glossary_GUID = {F8202732-F2BC-4688-9FBC-EE4C1C9A06D3} | 节名GUID
Purpose:用途 = 存储Agent对维护者定义术语的消化解读 | 非原文复制，是AI理解后的正名归档
EntryFormat:条目格式 =
    键名 = 术语名或术语:中文名 | 使用冒号分隔英文和中文
    键值 = 多行定义文本 | 竖线后为值注释
    值注释 = 补充说明或延伸思考
CategoryRule:分类规则 =
    使用注释行分组术语：; --- 分类名 ---
    建议分类：PUC核心、维护者自创术语(正名体系)、技术术语、PUC体系术语
    分组注释不参与解析
InterpolationRule:增量规则 =
    新术语追加到对应分类注释行之后
    相同术语有差异时，补足或融合(非覆盖)
    保留术语的原始定义作为历史参考
Example:示例 =
    ; --- PUC核心 ---
    PUC:双重含义 =
        Pop-Up Card 弹出卡片 | 像折叠生日卡，打开才见全貌
        Portable Universal Context 便携式上下文 | 跨AI平台的人机协作描述协议
    ; --- 正名体系 ---
    针值:Needle Value = HWND/句柄的正名 | 即用即弃的资源凭证

[PUC\AGENT\KnowledgeBase\Conclusions]
__note__ = <C04-4> 结论归档规范 | 定义关键结论的条目格式
PUC\AGENT\KnowledgeBase\Conclusions_GUID = {E28596C2-4014-4C36-888D-B378F2D28269} | 节名GUID
Purpose:用途 = 存储Agent推理和理解产生的关键结论 | 跨会话复用，避免重复推导
EntryFormat:条目格式 =
    键名 = ConclusionN:描述性标题 | N从1开始递增
    键值 = 多行结论文本
    值注释 = 可选，补充说明结论来源或适用范围
OrderingRule:排序规则 =
    Conclusion编号按添加顺序递增
    修改已有结论时保留编号，追加修订说明
    不删除旧结论，仅标记Deprecated或追加CounterConclusion
ScopeRule:适用范围 =
    结论应标注适用范围(如适用条件、依赖的PUC版本)
    不确定的结论标注"待验证"
Example:示例 =
    Conclusion1:工作流规则 =
        文件池(D:\Share\AI_Files)是唯一工作空间
        所有目录访问需用户明确授权
        | 基础工作约束，跨所有Agent实例适用

; ========== 规范元数据 ==========
[__Specification__]
__note__ = 本文件自身的元数据 | 规范元数据节
__Specification___GUID = {E8AD3CAD-D3FF-42F8-80B3-ADFCF1CCC6EA} | 规范元数据的唯一GUID
EndingKey:增量节尾 = <C04-4> | 本规范最后一个节点的顺序号
Name:规范名称 = PUC-AI_Knowledge_Base
Version:规范版本 = 1.0
Date:制定日期 = 2026-05-23
BasedOn:基础规范 = PUC注释增强规范 v3.0.6 + PUC-AI载入文档规范 v1.0 + PUC文件集规范 v3.0.5.1
Description:描述 = 定义AI Agent语义知识库的结构规范，涵盖KnowledgeBase根节(C01-3)及其三个子节：BOOT(启动元数据 C02-4)、Glossary(术语消化 C03-4)、Conclusions(关键结论 C04-4)。挂接于[PUC\AGENT] <C00-2>下，构成Agent认知体系的语义层。遵循PUC三层注释规范和MountFile挂载机制，支持独立子文件模式。
