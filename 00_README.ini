PUC（Portable Universal Context） | 便携式上下文

PUC（Pop-Up Card）| 弹出卡片，对就是那个可以折叠的生日卡片哦。

这是一个用于“人–AI 多轮协作”的上下文描述规范。

它不是代码库，也不是配置文件集合。

如果你是第一次看到 “PUC”

请按顺序阅读：

01_PUC注释增强规范

02_PUC文件集规范

PUC 关注的是：

- 上下文如何被描述
  
- 如何被拆分、归档、迁移
  
而不是具体的实现技术。

